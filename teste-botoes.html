<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste Botões</title>
    <style>
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .teste-container {
            background: #1a5c64;
            padding: 30px;
            border-radius: 30px;
            border: 3px solid #ffd966;
            width: 90%;
            max-width: 400px;
        }
        
        .area-teste {
            background: #0b3a3f;
            height: 200px;
            border-radius: 20px;
            margin-bottom: 30px;
            position: relative;
            border: 2px solid #ffd966;
            overflow: hidden;
        }
        
        #quadrado {
            width: 50px;
            height: 50px;
            background: #ff6b9d;
            border: 3px solid #ffd966;
            border-radius: 15px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .botoes-teste {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        
        .linha-botoes {
            display: flex;
            gap: 30px;
            justify-content: center;
        }
        
        .btn-teste {
            width: 80px;
            height: 80px;
            background: #ff6b9d;
            border: 4px solid #ffd966;
            border-radius: 20px;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 0 #b3456b;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        
        .btn-teste:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .info {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="teste-container">
        <div class="area-teste">
            <div id="quadrado">💙</div>
        </div>
        
        <div class="botoes-teste">
            <div class="linha-botoes">
                <button class="btn-teste" id="btnEsq">⬅️</button>
                <button class="btn-teste" id="btnPulo">⬆️</button>
                <button class="btn-teste" id="btnDir">➡️</button>
            </div>
        </div>
        
        <div class="info">
            <p id="posX">X: 0</p>
            <p id="posY">Y: 0</p>
        </div>
    </div>

    <script>
        // PEGAR ELEMENTOS
        const quadrado = document.getElementById('quadrado');
        const btnEsq = document.getElementById('btnEsq');
        const btnDir = document.getElementById('btnDir');
        const btnPulo = document.getElementById('btnPulo');
        const posX = document.getElementById('posX');
        const posY = document.getElementById('posY');
        
        // POSIÇÃO ATUAL
        let x = 0;
        let y = 0;
        
        // FUNÇÃO PARA ATUALIZAR POSIÇÃO
        function atualizarPosicao() {
            quadrado.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            posX.textContent = `X: ${x}`;
            posY.textContent = `Y: ${y}`;
        }
        
        // BOTÃO ESQUERDA
        btnEsq.addEventListener('mousedown', (e) => {
            e.preventDefault();
            x -= 10;
            atualizarPosicao();
            console.log('ESQUERDA PRESSIONADO');
        });
        
        btnEsq.addEventListener('mouseup', (e) => {
            e.preventDefault();
            console.log('ESQUERDA SOLTO');
        });
        
        // BOTÃO DIREITA
        btnDir.addEventListener('mousedown', (e) => {
            e.preventDefault();
            x += 10;
            atualizarPosicao();
            console.log('DIREITA PRESSIONADO');
        });
        
        btnDir.addEventListener('mouseup', (e) => {
            e.preventDefault();
            console.log('DIREITA SOLTO');
        });
        
        // BOTÃO PULO
        btnPulo.addEventListener('mousedown', (e) => {
            e.preventDefault();
            y -= 10;
            atualizarPosicao();
            console.log('PULO PRESSIONADO');
        });
        
        btnPulo.addEventListener('mouseup', (e) => {
            e.preventDefault();
            console.log('PULO SOLTO');
        });
        
        // TOUCH
        btnEsq.addEventListener('touchstart', (e) => {
            e.preventDefault();
            x -= 10;
            atualizarPosicao();
            console.log('ESQUERDA TOUCH');
        });
        
        btnDir.addEventListener('touchstart', (e) => {
            e.preventDefault();
            x += 10;
            atualizarPosicao();
            console.log('DIREITA TOUCH');
        });
        
        btnPulo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            y -= 10;
            atualizarPosicao();
            console.log('PULO TOUCH');
        });
        
        // IMPEDIR CLIQUE PADRÃO
        [btnEsq, btnDir, btnPulo].forEach(btn => {
            btn.addEventListener('click', (e) => e.preventDefault());
        });
        
        // INICIAR
        atualizarPosicao();
    </script>
</body>
</html>
